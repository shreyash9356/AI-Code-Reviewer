<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Code Reviewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>AI Code Review Tool</h1>
      <p>Paste your code below and let the AI analyze it for bugs, performance issues, and security risks.</p>
    </header>

    <main class="main">
      <section class="input-panel">
        <label for="language">Language</label>
        <select id="language">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="java">Java</option>
        </select>

        <label for="code">Source Code</label>
        <textarea id="code" placeholder="Paste your code here..."></textarea>

        <button id="analyze-btn">Analyze Code</button>
        <p id="status" class="status"></p>
      </section>

      <section class="output-panel">
        <h2>Analysis Results</h2>
        <pre id="results" class="results"></pre>
      </section>
    </main>

    <footer class="footer">
      <small>Built with FastAPI and an LLM backend. Starter template for hackathons.</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
